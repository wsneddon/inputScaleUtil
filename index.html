<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>4-20mA Scaler</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1c1c1e; color: #f2f2f7;
      min-height: 100vh; padding: 16px;
    }
    h1 { font-size: 1.3rem; font-weight: 700; color: #0a84ff; margin-bottom: 12px; text-align: center; }
    .type-row {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 14px;
    }
    .type-row label { font-size: 0.85rem; color: #8e8e93; }
    .type-row select {
      background: #2c2c2e; border: 1px solid #48484a; border-radius: 8px;
      color: #f2f2f7; font-size: 1rem; padding: 6px 10px;
      outline: none; -webkit-appearance: none;
    }
    .type-row select:focus { border-color: #0a84ff; }
    .tabs { display: flex; background: #2c2c2e; border-radius: 10px; padding: 3px; margin-bottom: 16px; }
    .tab {
      flex: 1; text-align: center; padding: 8px; border-radius: 8px;
      font-size: 0.85rem; cursor: pointer; color: #8e8e93; transition: all 0.2s;
    }
    .tab.active { background: #0a84ff; color: white; font-weight: 600; }
    .card { background: #2c2c2e; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .card h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8e8e93; margin-bottom: 12px; }
    .row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; width: 100%; overflow: hidden; }
    label { font-size: 0.85rem; color: #aeaeb2; min-width: 80px; }
    input, select {
      flex: 1; min-width: 0;
      background: #3a3a3c; border: 1px solid #48484a; border-radius: 8px;
      color: #f2f2f7; font-size: 1rem; padding: 8px 10px;
      outline: none; -webkit-appearance: none;
    }
    input:focus, select:focus { border-color: #0a84ff; }
    .unit-select { flex: 0 0 100px; }
    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .result-box { background: #3a3a3c; border-radius: 10px; padding: 12px; text-align: center; }
    .result-box .val { font-size: 1.4rem; font-weight: 700; color: #30d158; }
    .result-box .unit { font-size: 0.75rem; color: #8e8e93; margin-top: 2px; }
    .result-box.highlight .val { color: #0a84ff; }
    .slider-row { margin-top: 12px; }
    input[type=range] { width: 100%; accent-color: #0a84ff; padding: 0; border: none; background: transparent; }
    .slider-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: #8e8e93; margin-top: 4px; }
    .section { display: none; }
    .section.active { display: block; }
    .conversion-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .conversion-table td { padding: 8px 6px; border-bottom: 1px solid #3a3a3c; }
    .conversion-table td:first-child { color: #8e8e93; }
    .conversion-table td:last-child { text-align: right; font-weight: 600; color: #30d158; }
  </style>
</head>
<body>

<h1>4-20 mA Scaler</h1>

<!-- Global measurement type selector -->
<div class="type-row">
  <label>Type:</label>
  <select id="meas_type" onchange="onTypeChange()">
    <option value="pressure">Pressure</option>
    <option value="flow">Flow</option>
    <option value="humidity">Humidity</option>
  </select>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('scaler')">Scaler</div>
  <div class="tab" onclick="showTab('reverse')">Reverse</div>
  <div class="tab" onclick="showTab('convert')">Convert</div>
</div>

<!-- ── SCALER: mA → value ── -->
<div id="scaler" class="section active">
  <div class="card">
    <h2>Transmitter Range</h2>
    <div class="row">
      <label>4 mA =</label>
      <input type="number" id="s_lo" value="0" oninput="calcScaler()">
      <select id="s_unit" class="unit-select" onchange="syncUnitLabel('s_unit','s_unit_label');calcScaler()"></select>
    </div>
    <div class="row">
      <label>20 mA =</label>
      <input type="number" id="s_hi" value="100" oninput="calcScaler()">
      <span style="min-width:100px;font-size:0.85rem;color:#8e8e93;padding-left:10px" id="s_unit_label"></span>
    </div>
  </div>

  <div class="card">
    <h2>Input Signal</h2>
    <div class="row">
      <input type="number" id="s_input" value="12" step="0.01" oninput="calcScaler()">
      <select id="s_input_type" class="unit-select" onchange="calcScaler()">
        <option value="ma">mA</option>
        <option value="pct">%</option>
      </select>
    </div>
    <div class="slider-row">
      <input type="range" id="s_slider" min="0" max="100" step="0.1" value="50" oninput="syncInputFromSlider();calcScaler()">
      <div class="slider-labels"><span>0%</span><span>50%</span><span>100%</span></div>
    </div>
  </div>

  <div class="card">
    <h2>Results</h2>
    <div class="result-grid" id="s_results"></div>
  </div>

  <div class="card">
    <h2>Custom 100% Span</h2>
    <div class="row">
      <label>100% =</label>
      <input type="number" id="s_span" value="0" oninput="calcScaler()">
      <select id="s_span_unit" class="unit-select" onchange="calcScaler()"></select>
    </div>
    <div class="result-grid" id="s_span_results"></div>
  </div>

  <!-- Pipe velocity (flow only) -->
  <div class="card" id="pipe_card" style="display:none">
    <h2>Pipe Velocity</h2>
    <div class="row">
      <label>Pipe Size</label>
      <select id="pipe_size" class="unit-select" style="flex:1" onchange="calcScaler()"></select>
    </div>
    <div class="result-grid" id="pipe_results"></div>
  </div>
</div>

<!-- ── REVERSE: value/% → mA ── -->
<div id="reverse" class="section">
  <div class="card">
    <h2>Transmitter Range</h2>
    <div class="row">
      <label>4 mA =</label>
      <input type="number" id="r_lo" value="0" oninput="calcReverse()">
      <select id="r_unit" class="unit-select" onchange="syncUnitLabel('r_unit','r_unit_label');calcReverse()"></select>
    </div>
    <div class="row">
      <label>20 mA =</label>
      <input type="number" id="r_hi" value="100" oninput="calcReverse()">
      <span style="min-width:100px;font-size:0.85rem;color:#8e8e93;padding-left:10px" id="r_unit_label"></span>
    </div>
  </div>

  <div class="card">
    <h2>Enter Known Value</h2>
    <div class="row">
      <label id="r_val_label"></label>
      <input type="number" id="r_val" value="50" oninput="calcReverse()">
    </div>
    <div class="row" style="margin-top:8px">
      <label>— or % —</label>
      <input type="number" id="r_pct" value="50" min="0" max="100" oninput="calcReverseFromPct()">
      <span style="min-width:100px;font-size:0.85rem;color:#8e8e93;padding-left:10px">%</span>
    </div>
  </div>

  <div class="card">
    <h2>Results</h2>
    <div class="result-grid" id="r_results"></div>
  </div>
</div>

<!-- ── CONVERT: unit conversion ── -->
<div id="convert" class="section">
  <div class="card">
    <h2 id="c_title">Pressure Unit Converter</h2>
    <div class="row">
      <input type="number" id="c_val" value="100" oninput="calcConvert()">
      <select id="c_unit" class="unit-select" onchange="calcConvert()"></select>
    </div>
  </div>
  <div class="card">
    <h2>Equivalents</h2>
    <table class="conversion-table" id="c_table"></table>
  </div>
</div>

<!-- ── HUMIDITY: Psychrometric calculations ── -->
<div id="humidity" class="section">
  <div class="card">
    <h2>Psychrometric Calculator</h2>
    <div class="row">
      <label>Dry Bulb</label>
      <input type="number" id="h_db" value="75" step="0.1" oninput="calcHumidity()">
      <select id="h_temp_unit" class="unit-select" onchange="convertHumidityTemp()">
        <option value="f">°F</option>
        <option value="c">°C</option>
      </select>
    </div>
    <div class="row">
      <label>Input</label>
      <input type="number" id="h_input" value="65" step="0.1" oninput="calcHumidity()">
      <select id="h_mode" class="unit-select" onchange="toggleHumidityMode()">
        <option value="wb">Wet Bulb</option>
        <option value="dp">Dewpoint</option>
        <option value="rh">RH%</option>
      </select>
    </div>
    <div class="row">
      <label>Pressure</label>
      <input type="number" id="h_press" value="29.92" step="0.01" oninput="calcHumidity()">
      <select id="h_press_unit" class="unit-select" onchange="calcHumidity()">
        <option value="inhg">inHg</option>
        <option value="kpa">kPa</option>
        <option value="mbar">mbar</option>
      </select>
    </div>
  </div>
  <div class="card">
    <h2>Results</h2>
    <div class="result-grid" id="h_results"></div>
  </div>
</div>

<script>
// ── Pressure ──────────────────────────────────────────────────────────────
const toPSI = {
  psi:  1, ftWC: 0.43353, inWC: 0.036127,
  kPa:  0.14504, bar: 14.5038,
  inHg: 0.49116, mmHg: 0.019337, atm: 14.6959,
};
const pressureLabels = {
  psi:'PSI', ftWC:'ft WC', inWC:'in WC', kPa:'kPa',
  bar:'bar', inHg:'in Hg', mmHg:'mm Hg', atm:'atm',
};
// Scaler/Reverse only show these (no inHg/mmHg/atm in range dropdowns)
const pressureRangeUnits = ['psi','ftWC','inWC','kPa','bar'];

// ── Flow ──────────────────────────────────────────────────────────────────
// Base unit: L/s
const toLPS = {
  lps:   1,           // liters per second
  lpm:   1/60,        // liters per minute
  m3h:   1/3.6,       // cubic meters per hour
  m3s:   1000,        // cubic meters per second
  gpm:   0.0630902,   // US gallons per minute
  gps:   3.78541,     // US gallons per second
  cfm:   0.471947,    // cubic feet per minute (actual)
  cfs:   28.3168,     // cubic feet per second
  scfm:  0.471947,    // standard CFM (same conversion for scaling; standard conditions assumed)
  mgd:   0.0438126,   // million US gallons per day
};
const flowLabels = {
  lps:'L/s', lpm:'L/min', m3h:'m³/h', m3s:'m³/s',
  gpm:'GPM', gps:'GPS', cfm:'CFM', cfs:'CFS',
  scfm:'SCFM', mgd:'MGD',
};
const flowRangeUnits = ['lps','lpm','m3h','gpm','gps','cfm','scfm'];
const flowAllUnits   = ['lps','lpm','m3h','m3s','gpm','gps','cfm','cfs','scfm','mgd'];

// ── Humidity ──────────────────────────────────────────────────────────────
// Psychrometric calculations
function satVaporPressure(tC) {
  // Magnus formula: es in kPa
  return 0.61094 * Math.exp((17.625 * tC) / (tC + 243.04));
}

function calcRH(dbC, wbC, pressKPa) {
  const es_wb = satVaporPressure(wbC);
  const es_db = satVaporPressure(dbC);
  const e = es_wb - pressKPa * (dbC - wbC) * 0.00066 * (1 + 0.00115 * wbC);
  return Math.max(0, Math.min(100, (e / es_db) * 100));
}

function calcDewpoint(dbC, rh) {
  const es_db = satVaporPressure(dbC);
  const e = (rh / 100) * es_db;
  const ln_e = Math.log(e / 0.61094);
  return (243.04 * ln_e) / (17.625 - ln_e);
}

function calcWetBulb(dbC, dpC, pressKPa) {
  // Better iterative method using psychrometric equation
  const es_dp = satVaporPressure(dpC);
  let wb = dpC; // Start with dewpoint as initial guess
  
  for (let i = 0; i < 50; i++) {
    const es_wb = satVaporPressure(wb);
    const es_db = satVaporPressure(dbC);
    
    // Psychrometric equation: e = es_wb - A * P * (T_db - T_wb)
    // where A = 0.00066 * (1 + 0.00115 * T_wb)
    const A = 0.00066 * (1 + 0.00115 * wb);
    const e_calc = es_wb - A * pressKPa * (dbC - wb);
    
    // We want e_calc to equal es_dp
    const error = e_calc - es_dp;
    
    if (Math.abs(error) < 0.001) break;
    
    // Adjust wet bulb based on error
    // Derivative approximation for Newton's method
    const delta = 0.01;
    const es_wb_delta = satVaporPressure(wb + delta);
    const A_delta = 0.00066 * (1 + 0.00115 * (wb + delta));
    const e_calc_delta = es_wb_delta - A_delta * pressKPa * (dbC - wb - delta);
    const derivative = (e_calc_delta - e_calc) / delta;
    
    if (Math.abs(derivative) > 0.001) {
      wb = wb - error / derivative;
    } else {
      wb = wb - error * 0.1; // Fallback to simple adjustment
    }
    
    // Keep wet bulb between dewpoint and dry bulb
    wb = Math.max(dpC, Math.min(dbC, wb));
  }
  
  return wb;
}

function toggleHumidityMode() {
  calcHumidity();
}

function convertHumidityTemp() {
  const mode = document.getElementById('h_mode').value;
  const tempUnit = document.getElementById('h_temp_unit').value;
  const dbInput = document.getElementById('h_db');
  const input = document.getElementById('h_input');
  
  // Track previous unit in dataset
  const prevUnit = dbInput.dataset.prevUnit || 'f';
  
  // Only convert if unit actually changed
  if (prevUnit === tempUnit) {
    calcHumidity();
    return;
  }
  
  // Get current values
  let db = parseFloat(dbInput.value) || 0;
  let val = parseFloat(input.value) || 0;
  
  if (tempUnit === 'f') {
    // Converting C to F
    dbInput.value = (db * 9/5 + 32).toFixed(1);
    if (mode !== 'rh') {
      input.value = (val * 9/5 + 32).toFixed(1);
    }
  } else {
    // Converting F to C
    dbInput.value = ((db - 32) * 5/9).toFixed(1);
    if (mode !== 'rh') {
      input.value = ((val - 32) * 5/9).toFixed(1);
    }
  }
  
  // Store current unit for next change
  dbInput.dataset.prevUnit = tempUnit;
  
  calcHumidity();
}

function calcHumidity() {
  const mode = document.getElementById('h_mode').value;
  let db = parseFloat(document.getElementById('h_db').value) || 0;
  let input = parseFloat(document.getElementById('h_input').value) || 0;
  let press = parseFloat(document.getElementById('h_press').value) || 29.92;
  const tempUnit = document.getElementById('h_temp_unit').value;
  const pressUnit = document.getElementById('h_press_unit').value;

  // Convert to C and kPa
  const dbC = tempUnit === 'f' ? (db - 32) * 5/9 : db;
  let inputC = mode === 'rh' ? input : (tempUnit === 'f' ? (input - 32) * 5/9 : input);
  let pressKPa = press;
  if (pressUnit === 'inhg') pressKPa = press * 3.38639;
  else if (pressUnit === 'mbar') pressKPa = press * 0.1;

  let rh, dpC, wbC;

  if (mode === 'wb') {
    // Wet bulb mode
    wbC = inputC;
    if (wbC > dbC) {
      document.getElementById('h_results').innerHTML =
        '<div style="grid-column:1/-1;color:#ff453a;text-align:center">Wet bulb cannot exceed dry bulb</div>';
      return;
    }
    rh = calcRH(dbC, wbC, pressKPa);
    dpC = calcDewpoint(dbC, rh);
  } else if (mode === 'dp') {
    // Dewpoint mode
    dpC = inputC;
    if (dpC > dbC) {
      document.getElementById('h_results').innerHTML =
        '<div style="grid-column:1/-1;color:#ff453a;text-align:center">Dewpoint cannot exceed dry bulb</div>';
      return;
    }
    const es_db = satVaporPressure(dbC);
    const es_dp = satVaporPressure(dpC);
    rh = (es_dp / es_db) * 100;
    wbC = calcWetBulb(dbC, dpC, pressKPa);
  } else {
    // RH mode
    rh = input;
    if (rh < 0 || rh > 100) {
      document.getElementById('h_results').innerHTML =
        '<div style="grid-column:1/-1;color:#ff453a;text-align:center">RH must be between 0-100%</div>';
      return;
    }
    dpC = calcDewpoint(dbC, rh);
    wbC = calcWetBulb(dbC, dpC, pressKPa);
  }

  const dpF = dpC * 9/5 + 32;
  const wbF = wbC * 9/5 + 32;

  if (mode === 'wb') {
    document.getElementById('h_results').innerHTML =
      `<div class="result-box highlight">
        <div class="val">${rh.toFixed(1)}</div>
        <div class="unit">% RH</div>
      </div>
      <div class="result-box">
        <div class="val">${dpF.toFixed(1)}</div>
        <div class="unit">Dewpoint °F</div>
      </div>
      <div class="result-box">
        <div class="val">${dpC.toFixed(1)}</div>
        <div class="unit">Dewpoint °C</div>
      </div>`;
  } else if (mode === 'dp') {
    document.getElementById('h_results').innerHTML =
      `<div class="result-box highlight">
        <div class="val">${rh.toFixed(1)}</div>
        <div class="unit">% RH</div>
      </div>
      <div class="result-box">
        <div class="val">${wbF.toFixed(1)}</div>
        <div class="unit">Wet Bulb °F</div>
      </div>
      <div class="result-box">
        <div class="val">${wbC.toFixed(1)}</div>
        <div class="unit">Wet Bulb °C</div>
      </div>`;
  } else {
    document.getElementById('h_results').innerHTML =
      `<div class="result-box">
        <div class="val">${dpF.toFixed(1)}</div>
        <div class="unit">Dewpoint °F</div>
      </div>
      <div class="result-box">
        <div class="val">${dpC.toFixed(1)}</div>
        <div class="unit">Dewpoint °C</div>
      </div>
      <div class="result-box">
        <div class="val">${wbF.toFixed(1)}</div>
        <div class="unit">Wet Bulb °F</div>
      </div>
      <div class="result-box">
        <div class="val">${wbC.toFixed(1)}</div>
        <div class="unit">Wet Bulb °C</div>
      </div>`;
  }
}

// ── Pipe sizes: [label, ID inches] ───────────────────────────────────────
const PIPE_SIZES = [
  ['½"',  0.622], ['¾"',  0.824], ['1"',   1.049], ['1¼"', 1.380],
  ['1½"', 1.610], ['2"',  2.067], ['2½"',  2.469], ['3"',  3.068],
  ['4"',  4.026], ['6"',  6.065], ['8"',   7.981], ['10"', 10.020],
  ['12"', 11.938],['16"', 15.000],['18"',  17.000],['20"', 19.000],
  ['24"', 23.000],
];

// ── Helpers ───────────────────────────────────────────────────────────────
function activeType() { return document.getElementById('meas_type').value; }

function units() {
  return activeType() === 'flow'
    ? { toBase: toLPS, labels: flowLabels, rangeUnits: flowRangeUnits, allUnits: flowAllUnits }
    : { toBase: toPSI, labels: pressureLabels, rangeUnits: pressureRangeUnits,
        allUnits: Object.keys(toPSI) };
}

function convertUnits(val, from, to) {
  const u = units();
  return val * u.toBase[from] / u.toBase[to];
}

function fmt(n) {
  if (Math.abs(n) >= 1000) return n.toFixed(1);
  if (Math.abs(n) >= 100)  return n.toFixed(2);
  return n.toFixed(3);
}

function populateSelect(id, unitList, selected) {
  const sel = document.getElementById(id);
  const cur = selected || sel.value;
  const { labels } = units();
  sel.innerHTML = unitList.map(u =>
    `<option value="${u}"${u===cur?' selected':''}>${labels[u]}</option>`
  ).join('');
}

function syncUnitLabel(selId, spanId) {
  const u = document.getElementById(selId).value;
  document.getElementById(spanId).textContent = units().labels[u];
}

function populatePipeSizes() {
  const sel = document.getElementById('pipe_size');
  const cur = sel.value;
  sel.innerHTML = PIPE_SIZES.map(([lbl, id]) =>
    `<option value="${id}"${id==cur?' selected':''}>${lbl} NPS (ID ${id}")</option>`
  ).join('');
}

// ── Type change ───────────────────────────────────────────────────────────
function onTypeChange() {
  const type = activeType();
  const isFlow = type === 'flow';
  const isHumidity = type === 'humidity';

  // Hide/show tabs based on type
  document.querySelectorAll('.tab').forEach(t => {
    const tabName = t.textContent.toLowerCase();
    if (isHumidity) {
      t.style.display = tabName === 'humidity' ? '' : 'none';
    } else {
      t.style.display = tabName === 'humidity' ? 'none' : '';
    }
  });

  if (isHumidity) {
    showTab('humidity');
    calcHumidity();
    return;
  }

  const { rangeUnits, allUnits, labels } = units();

  // Re-populate all unit selects
  populateSelect('s_unit',      rangeUnits, rangeUnits[0]);
  populateSelect('s_span_unit', rangeUnits, rangeUnits[0]);
  populateSelect('r_unit',      rangeUnits, rangeUnits[0]);
  populateSelect('c_unit',      allUnits,   allUnits[0]);

  // Update convert tab title
  document.getElementById('c_title').textContent =
    isFlow ? 'Flow Unit Converter' : 'Pressure Unit Converter';

  // Show/hide pipe card
  document.getElementById('pipe_card').style.display = isFlow ? '' : 'none';

  // Update unit labels
  syncUnitLabel('s_unit', 's_unit_label');
  syncUnitLabel('r_unit', 'r_unit_label');
  document.getElementById('r_val_label').textContent = labels[rangeUnits[0]];

  // Default hi values that make sense per type
  document.getElementById('s_hi').value = isFlow ? '100' : '100';
  document.getElementById('r_hi').value = isFlow ? '100' : '100';
  document.getElementById('c_val').value = isFlow ? '100' : '100';

  calcScaler(); calcReverse(); calcConvert();
}

// ── Tab switching ─────────────────────────────────────────────────────────
function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (event && event.target) event.target.classList.add('active');
}

// ── Scaler ────────────────────────────────────────────────────────────────
function syncInputFromSlider() {
  const pct  = parseFloat(document.getElementById('s_slider').value);
  const type = document.getElementById('s_input_type').value;
  let displayVal;
  if      (type === 'ma')  displayVal = 4 + pct / 100 * 16;
  else if (type === 'pct') displayVal = pct;
  document.getElementById('s_input').value = parseFloat(displayVal.toFixed(4));
}

function calcScaler() {
  const lo     = parseFloat(document.getElementById('s_lo').value) || 0;
  const hi     = parseFloat(document.getElementById('s_hi').value) || 0;
  const input  = parseFloat(document.getElementById('s_input').value) || 0;
  const type   = document.getElementById('s_input_type').value;
  const txUnit = document.getElementById('s_unit').value;
  const span   = parseFloat(document.getElementById('s_span').value) || 0;
  const { rangeUnits, labels } = units();

  syncUnitLabel('s_unit', 's_unit_label');

  let pct;
  if      (type === 'ma')  pct = (input - 4) / 16 * 100;
  else if (type === 'pct') pct = input;

  const ma    = 4 + pct / 100 * 16;
  const valTx = lo + (hi - lo) * pct / 100;

  document.getElementById('s_slider').value = Math.min(100, Math.max(0, pct));

  const results = rangeUnits.map(u => ({ u, v: convertUnits(valTx, txUnit, u) }));

  document.getElementById('s_results').innerHTML =
    results.map(r =>
      `<div class="result-box${r.u === txUnit ? ' highlight' : ''}">
        <div class="val">${fmt(r.v)}</div>
        <div class="unit">${labels[r.u]}</div>
      </div>`
    ).join('') +
    `<div class="result-box highlight">
      <div class="val">${pct.toFixed(1)}%</div>
      <div class="unit">% of span</div>
    </div>
    <div class="result-box highlight">
      <div class="val">${ma.toFixed(3)}</div>
      <div class="unit">mA</div>
    </div>
    <div class="result-box" id="s_pct_custom_span">
      <div class="val">—</div><div class="unit">% of custom span</div>
    </div>`;

  if (span > 0) {
    const spanUnit   = document.getElementById('s_span_unit').value;
    const valInSpanU = convertUnits(valTx, txUnit, spanUnit);
    const pctSpan    = valInSpanU / span * 100;
    const spanInTxU  = convertUnits(span, spanUnit, txUnit);
    const maAtSpan   = 4 + (spanInTxU - lo) / (hi - lo) * 16;

    const inlineBox = document.getElementById('s_pct_custom_span');
    if (inlineBox) {
      inlineBox.className = 'result-box highlight';
      inlineBox.innerHTML = `<div class="val">${pctSpan.toFixed(1)}%</div><div class="unit">% of custom span</div>`;
    }
    document.getElementById('s_span_results').innerHTML =
      `<div class="result-box">
        <div class="val">${fmt(valInSpanU)}</div>
        <div class="unit">${labels[spanUnit]} (current)</div>
      </div>
      <div class="result-box">
        <div class="val">${maAtSpan.toFixed(3)}</div>
        <div class="unit">mA at 100% span</div>
      </div>`;
  } else {
    document.getElementById('s_span_results').innerHTML = '';
  }

  // Pipe velocity (flow only)
  if (activeType() === 'flow') {
    const idIn    = parseFloat(document.getElementById('pipe_size').value);
    const idFt    = idIn / 12;
    const areaFt2 = Math.PI / 4 * idFt * idFt;
    // valTx is in txUnit (flow); convert to CFS for ft/s
    const cfs     = convertUnits(valTx, txUnit, 'cfs');
    const ftps    = cfs / areaFt2;
    const mps     = ftps * 0.3048;
    document.getElementById('pipe_results').innerHTML =
      `<div class="result-box highlight">
        <div class="val">${ftps.toFixed(2)}</div>
        <div class="unit">ft/s</div>
      </div>
      <div class="result-box">
        <div class="val">${mps.toFixed(2)}</div>
        <div class="unit">m/s</div>
      </div>`;
  }
}

// ── Reverse ───────────────────────────────────────────────────────────────
function calcReverse() {
  const lo   = parseFloat(document.getElementById('r_lo').value) || 0;
  const hi   = parseFloat(document.getElementById('r_hi').value) || 0;
  const val  = parseFloat(document.getElementById('r_val').value) || 0;
  const unit = document.getElementById('r_unit').value;
  const { labels } = units();

  syncUnitLabel('r_unit', 'r_unit_label');
  document.getElementById('r_val_label').textContent = labels[unit];

  const pct = (val - lo) / (hi - lo) * 100;
  const ma  = 4 + (val - lo) / (hi - lo) * 16;

  document.getElementById('r_pct').value = pct.toFixed(2);
  document.getElementById('r_results').innerHTML =
    `<div class="result-box highlight">
      <div class="val">${ma.toFixed(3)}</div>
      <div class="unit">mA</div>
    </div>
    <div class="result-box">
      <div class="val">${pct.toFixed(2)}%</div>
      <div class="unit">% of span</div>
    </div>`;
}

function calcReverseFromPct() {
  const lo  = parseFloat(document.getElementById('r_lo').value) || 0;
  const hi  = parseFloat(document.getElementById('r_hi').value) || 0;
  const pct = parseFloat(document.getElementById('r_pct').value) || 0;
  document.getElementById('r_val').value = fmt(lo + (hi - lo) * pct / 100);
  calcReverse();
}

// ── Convert ───────────────────────────────────────────────────────────────
function calcConvert() {
  const val  = parseFloat(document.getElementById('c_val').value) || 0;
  const unit = document.getElementById('c_unit').value;
  const { allUnits, labels } = units();
  document.getElementById('c_table').innerHTML =
    allUnits.filter(u => u !== unit).map(u =>
      `<tr><td>${labels[u]}</td><td>${fmt(convertUnits(val, unit, u))}</td></tr>`
    ).join('');
}

// ── Init ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  // Populate selects with pressure defaults
  const { rangeUnits, allUnits } = units();
  populateSelect('s_unit',      rangeUnits, 'psi');
  populateSelect('s_span_unit', rangeUnits, 'ftWC');
  populateSelect('r_unit',      rangeUnits, 'psi');
  populateSelect('c_unit',      allUnits,   'psi');
  populatePipeSizes();

  syncUnitLabel('s_unit', 's_unit_label');
  syncUnitLabel('r_unit', 'r_unit_label');
  document.getElementById('r_val_label').textContent = pressureLabels['psi'];
  document.getElementById('s_hi').value = '25';
  document.getElementById('r_hi').value = '25';
  document.getElementById('s_lo').value = '0';
  document.getElementById('r_lo').value = '0';
  document.getElementById('s_span').value = '39';

  calcScaler(); calcReverse(); calcConvert();
});
</script>
